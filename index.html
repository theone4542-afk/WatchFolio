<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WatchFolio — Search</title>
  <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@300;400;600;700&family=Overpass+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --bg2: #131720;
      --bg3: #1a2030;
      --surface: #1f2937;
      --border: #2a3548;
      --accent: #3db4f2;
      --accent-hover: #5ec5ff;
      --accent-dim: rgba(61,180,242,0.12);
      --green: #4cca74;
      --orange: #f79a63;
      --red: #e85d75;
      --text: #c9d1d9;
      --text-bright: #e6edf3;
      --text-muted: #6e7b8f;
      --text-dim: #4a5568;
      --card-bg: #161b27;
      --nav-bg: #151c28;
    }

    body { background: var(--bg); color: var(--text); font-family: 'Overpass', sans-serif; min-height: 100vh; }

    /* ── NAV ── */
    nav {
      background: var(--nav-bg); border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }

    .nav-left { display: flex; align-items: center; gap: 28px; }

    .logo { font-weight: 700; font-size: 20px; color: var(--accent); text-decoration: none; }

    .nav-links { display: flex; gap: 4px; list-style: none; }

    .nav-links a {
      color: var(--text-muted); text-decoration: none;
      font-size: 13px; font-weight: 600;
      padding: 6px 12px; border-radius: 4px; transition: all 0.15s;
    }

    .nav-links a:hover { color: var(--text-bright); background: var(--bg3); }
    .nav-links a.active { color: var(--accent); background: var(--accent-dim); }

    .nav-right { display: flex; gap: 8px; }

    .btn-login {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      padding: 6px 16px; border-radius: 4px; font-family: 'Overpass', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }

    .btn-login:hover { border-color: var(--accent); color: var(--accent); }

    .btn-signup {
      background: var(--accent); border: none; color: #0d1117;
      padding: 6px 16px; border-radius: 4px; font-family: 'Overpass', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }

    /* ── BANNER ── */
    .banner {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 40px 32px 32px;
    }

    .banner-inner { max-width: 1200px; margin: 0 auto; }

    .banner-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
    }

    .banner-title { font-size: 28px; font-weight: 700; color: var(--text-bright); margin-bottom: 6px; }
    .banner-title span { color: var(--accent); }
    .banner-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }

    /* ── SEARCH BAR ── */
    .search-wrap { display: flex; gap: 8px; max-width: 600px; }

    .search-wrap input {
      flex: 1; background: var(--bg3); border: 1px solid var(--border);
      color: var(--text-bright); font-family: 'Overpass', sans-serif;
      font-size: 14px; padding: 10px 16px; border-radius: 6px; outline: none;
      transition: border-color 0.15s;
    }

    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus { border-color: var(--accent); }

    .search-wrap button {
      background: var(--accent); border: none; color: #0d1117;
      padding: 10px 20px; border-radius: 6px; font-family: 'Overpass', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap;
      transition: background 0.15s;
    }

    .search-wrap button:hover { background: var(--accent-hover); }

    /* ── FILTER TABS ── */
    .filter-tabs { display: flex; gap: 6px; margin-top: 16px; flex-wrap: wrap; }

    .filter-btn {
      background: var(--bg3); border: 1px solid var(--border); color: var(--text-muted);
      padding: 5px 14px; border-radius: 20px; font-family: 'Overpass', sans-serif;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }

    .filter-btn:hover { color: var(--text-bright); border-color: var(--accent); }
    .filter-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

    /* ── MAIN LAYOUT ── */
    .main-layout {
      max-width: 1200px; margin: 0 auto;
      padding: 24px 32px 60px;
    }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .section-title { font-size: 15px; font-weight: 700; color: var(--text-bright); }
    .section-title span {
      font-size: 12px; color: var(--text-muted); font-weight: 400;
      margin-left: 6px; font-family: 'Overpass Mono', monospace;
    }

    .see-all {
      font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 600;
      transition: color 0.15s;
    }

    .see-all:hover { color: var(--accent-hover); }

    /* ── GRID ── */
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
      gap: 14px;
    }

    /* ── CARD ── */
    .card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 6px; overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }

    .card-poster { width: 100%; aspect-ratio: 2/3; background: var(--bg3); position: relative; overflow: hidden; }

    .card-poster img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
    .card:hover .card-poster img { transform: scale(1.04); }

    .card-poster .no-img {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; color: var(--border);
    }

    .card-score {
      position: absolute; bottom: 6px; right: 6px;
      background: rgba(13,17,23,0.88); color: var(--accent);
      font-size: 10px; font-weight: 700; padding: 2px 6px;
      border-radius: 3px; font-family: 'Overpass Mono', monospace;
    }

    .card-type {
      position: absolute; top: 7px; left: 6px;
      background: rgba(13,17,23,0.8); color: var(--text-muted);
      font-size: 9px; font-weight: 700; padding: 2px 5px;
      border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* HOVER OVERLAY */
    .card-overlay {
      position: absolute; inset: 0;
      background: rgba(13,17,23,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 7px; opacity: 0; transition: opacity 0.2s; padding: 10px;
    }

    .card:hover .card-overlay { opacity: 1; }

    .overlay-btn {
      width: 100%; padding: 7px 0; border-radius: 4px;
      font-family: 'Overpass', sans-serif; font-size: 12px; font-weight: 700;
      cursor: pointer; border: none; transition: all 0.15s;
    }

    .overlay-btn.primary { background: var(--accent); color: #0d1117; }
    .overlay-btn.primary:hover { background: var(--accent-hover); }
    .overlay-btn.secondary { background: var(--bg3); color: var(--text-muted); border: 1px solid var(--border); }
    .overlay-btn.secondary:hover { color: var(--text-bright); border-color: var(--accent); }

    .card-body { padding: 9px 9px 10px; }

    .card-title {
      font-size: 12px; font-weight: 600; color: var(--text-bright);
      line-height: 1.4; margin-bottom: 3px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .card-year { font-size: 11px; color: var(--text-muted); }

    /* ── LOADING ── */
    .loading { text-align: center; padding: 80px 20px; display: none; }

    .spinner {
      width: 28px; height: 28px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; margin: 0 auto 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading p { font-size: 13px; color: var(--text-muted); }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 80px 20px; display: none; }
    .empty-icon { font-size: 44px; margin-bottom: 14px; }
    .empty p { font-size: 13px; color: var(--text-muted); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 22px; right: 22px;
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--accent); color: var(--text-bright);
      padding: 10px 16px; border-radius: 5px; font-size: 13px;
      opacity: 0; transform: translateY(8px); transition: all 0.25s;
      pointer-events: none; z-index: 999;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border); padding: 18px 32px;
      text-align: center; font-size: 12px; color: var(--text-dim);
    }

    footer span { color: var(--accent); }
  </style>

</head>
<body>

  <nav>
    <div class="nav-left">
      <a href="home.html" class="logo">WatchFolio</a>
      <ul class="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="index.html" class="active">Search</a></li>
        <li><a href="watchlist.html">Watchlist</a></li>
        <li><a href="#">Profile</a></li>
      </ul>
    </div>
    <div class="nav-right">
      <button class="btn-login">Log in</button>
      <button class="btn-signup">Sign up</button>
    </div>
  </nav>

  <!-- BANNER -->
  <div class="banner">
    <div class="banner-inner">
      <div class="banner-label">Discover</div>
      <div class="banner-title">Search <span>Movies & Shows</span></div>
      <div class="banner-sub">Find anything. Track everything.</div>
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Search titles, genres..." autocomplete="off"/>
        <button onclick="handleSearch()">Search</button>
      </div>
      <div class="filter-tabs">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('movie', this)">Movies</button>
        <button class="filter-btn" onclick="setFilter('tv', this)">TV Shows</button>
      </div>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="main-layout">
    <div class="section-header">
      <div class="section-title" id="sectionTitle">Trending Now <span id="resultCount"></span></div>
      <a href="#" class="see-all">See all →</a>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>

    <div class="empty" id="emptyState">
      <div class="empty-icon">🔍</div>
      <p>No results found. Try a different title.</p>
    </div>

    <div class="results-grid" id="resultsGrid"></div>
  </div>

  <footer>Built by <span>Conqueror</span> & <span>Zoro</span> · Data by TMDB</footer>
  <div class="toast" id="toast"></div>

  <script>
    // ── CONFIG ──
    const API_KEY = '12c07491ff5d8b932fe25c2d554dddbf'; // Replace with your key
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMG_URL  = 'https://image.tmdb.org/t/p/w300';

    let currentFilter = 'all';

    // ── WATCHLIST HELPERS ──
    function getWatchlist() { return JSON.parse(localStorage.getItem('watchfolio_watchlist') || '[]'); }
    function saveWatchlist(l) { localStorage.setItem('watchfolio_watchlist', JSON.stringify(l)); }

    function isInWatchlist(id) { return getWatchlist().some(i => i.id === id); }

    function addToWatchlist(item) {
      const list = getWatchlist();
      if (!list.some(i => i.id === item.id)) {
        list.push({ ...item, status: 'planning', addedAt: Date.now() });
        saveWatchlist(list);
        showToast(`"${item.title}" added to watchlist`);
      } else {
        showToast('Already in your watchlist!');
      }
    }

    // ── FILTER ──
    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const q = document.getElementById('searchInput').value.trim();
      if (q) handleSearch(); else loadTrending();
    }

    // ── SEARCH ──
    function handleSearch() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) { loadTrending(); return; }
      document.getElementById('sectionTitle').innerHTML = `Results for "${query}" <span id="resultCount"></span>`;
      if (currentFilter === 'movie') searchMedia(query, 'movie');
      else if (currentFilter === 'tv') searchMedia(query, 'tv');
      else searchMulti(query);
    }

    async function searchMulti(query) {
      showLoading();
      try {
        const res  = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}`);
        const data = await res.json();
        renderCards((data.results || []).filter(r => r.media_type === 'movie' || r.media_type === 'tv'));
      } catch { showEmpty(); }
    }

    async function searchMedia(query, type) {
      showLoading();
      try {
        const res  = await fetch(`${BASE_URL}/search/${type}?api_key=${API_KEY}&query=${encodeURIComponent(query)}`);
        const data = await res.json();
        renderCards((data.results || []).map(r => ({ ...r, media_type: type })));
      } catch { showEmpty(); }
    }

    async function loadTrending() {
      document.getElementById('sectionTitle').innerHTML = 'Trending Now <span id="resultCount"></span>';
      showLoading();
      try {
        const type = currentFilter === 'tv' ? 'tv' : currentFilter === 'movie' ? 'movie' : 'all';
        const res  = await fetch(`${BASE_URL}/trending/${type}/week?api_key=${API_KEY}`);
        const data = await res.json();
        renderCards(data.results || []);
      } catch { showEmpty(); }
    }

    // ── RENDER ──
    function renderCards(items) {
      hideLoading();
      const grid = document.getElementById('resultsGrid');
      if (!items.length) { showEmpty(); return; }
      document.getElementById('emptyState').style.display = 'none';
      const countEl = document.getElementById('resultCount');
      if (countEl) countEl.textContent = `— ${items.length} titles`;

      grid.innerHTML = items.map(item => {
        const title  = item.title || item.name || 'Unknown';
        const year   = (item.release_date || item.first_air_date || '').slice(0, 4);
        const rating = item.vote_average ? item.vote_average.toFixed(1) : '?';
        const type   = item.media_type === 'tv' ? 'TV' : 'Film';
        const poster = item.poster_path
          ? `<img src="${IMG_URL}${item.poster_path}" alt="${title}" loading="lazy"/>`
          : `<div class="no-img">🎬</div>`;

        const wlItem = {
          id: item.id, title, year,
          rating, type: item.media_type,
          poster: item.poster_path
        };

        return `
          <div class="card">
            <div class="card-poster">
              ${poster}
              <div class="card-type">${type}</div>
              <div class="card-score">★ ${rating}</div>
              <div class="card-overlay">
                <button class="overlay-btn primary" onclick='addToWatchlist(${JSON.stringify(wlItem)})'>
                  + Watchlist
                </button>
                <button class="overlay-btn secondary" onclick="window.location.href='watchlist.html'">
                  My List
                </button>
              </div>
            </div>
            <div class="card-body">
              <div class="card-title">${title}</div>
              <div class="card-year">${year}</div>
            </div>
          </div>`;
      }).join('');
    }

    // ── UI STATE ──
    function showLoading() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('resultsGrid').innerHTML = '';
      document.getElementById('emptyState').style.display = 'none';
    }

    function hideLoading() { document.getElementById('loading').style.display = 'none'; }

    function showEmpty() {
      hideLoading();
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('resultsGrid').innerHTML = '';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ── ENTER KEY ──
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSearch();
    });

    // ── INIT ──
    loadTrending();
  </script>
</body>
</html>
