<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WatchFolio — Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }
    .auth-wrapper::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(230,57,70,0.07) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .auth-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 8px;
      text-decoration: none;
      display: block;
      color: var(--text);
    }
    .auth-logo span { color: var(--accent); }

    .auth-tagline {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .auth-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 2px;
      margin-bottom: 24px;
      text-align: center;
    }

    .auth-form { display: flex; flex-direction: column; gap: 14px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .field input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .field input::placeholder { color: var(--muted); }
    .field input:focus { border-color: var(--accent); }

    .password-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .auth-submit {
      background: var(--accent);
      border: none;
      color: white;
      padding: 13px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
      width: 100%;
    }
    .auth-submit:hover { opacity: 0.85; }
    .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-msg {
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 13px;
      display: none;
    }
    .auth-msg.success {
      background: rgba(0,200,100,0.1);
      border: 1px solid rgba(0,200,100,0.25);
      color: #00c864;
      display: block;
    }
    .auth-msg.error {
      background: rgba(230,57,70,0.1);
      border: 1px solid rgba(230,57,70,0.25);
      color: var(--accent);
      display: block;
    }

    .auth-switch {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
    }
    .auth-switch a {
      color: var(--accent);
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .auth-switch a:hover { opacity: 0.8; }

    .back-home {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      transition: color 0.2s;
    }
    .back-home:hover { color: var(--text); }
  </style>
</head>
<body>

  <nav>
    <a href="home.html" class="logo">Watch<span>Folio</span></a>
    <ul class="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="index.html">Search</a></li>
      <li><a href="#">Watchlist</a></li>
      <li><a href="profile.html">Profile</a></li>
    </ul>
    <div class="nav-right">
      <button class="btn-login" onclick="location.href='login.html'">Log in</button>
      <button class="btn-signup" onclick="location.href='signup.html'">Sign up</button>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-box">
      <a href="home.html" class="auth-logo">Watch<span>Folio</span></a>
      <p class="auth-tagline">Start your personal cinema</p>
      <div class="auth-title">Create Account</div>

      <form class="auth-form" onsubmit="handleSignup(event)">
        <div class="field">
          <label>Username</label>
          <input type="text" id="signupUsername" placeholder="e.g. zoro" required/>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="you@email.com" required/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="••••••••" minlength="6" required/>
          <span class="password-hint">Minimum 6 characters</span>
        </div>
        <div class="auth-msg" id="signupMsg"></div>
        <button type="submit" class="auth-submit" id="signupBtn">Create Account</button>
      </form>

      <div class="auth-switch">
        Already have an account? <a href="login.html">Log in</a>
      </div>
      <a href="home.html" class="back-home">← Back to home</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL      = 'https://vhnbulihurzpzdzdivlc.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_OzoDhNIRlJhfvLiZYs3myg_hJNTxyPq';
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // redirect if already logged in
    _supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) location.href = 'profile.html';
    });

    async function handleSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('signupBtn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      const username = document.getElementById('signupUsername').value;
      const email    = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;

      const { error } = await _supabase.auth.signUp({
        email,
        password,
        options: { data: { username } }
      });

      const msg = document.getElementById('signupMsg');

      if (error) {
        msg.textContent = error.message;
        msg.className = 'auth-msg error';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      } else {
        msg.textContent = '🎉 Account created! Check your email to confirm, then log in.';
        msg.className = 'auth-msg success';
        btn.textContent = 'Done!';
        setTimeout(() => location.href = 'login.html', 3000);
      }
    }
  </script>

</body>
</html>
