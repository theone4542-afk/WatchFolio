<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WatchFolio — Login / Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }
    .auth-wrapper::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(230,57,70,0.07) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .auth-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .auth-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 8px;
    }
    .auth-logo span { color: var(--accent); }

    .auth-tagline {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    /* tabs */
    .auth-tabs {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      padding: 9px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .auth-tab.active {
      background: var(--accent);
      color: white;
    }

    /* form */
    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .auth-form.hidden { display: none; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: var(--muted);
      text-transform: uppercase;
    }
    .field input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .field input::placeholder { color: var(--muted); }
    .field input:focus { border-color: var(--accent); }

    .auth-submit {
      background: var(--accent);
      border: none;
      color: white;
      padding: 13px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
      width: 100%;
    }
    .auth-submit:hover { opacity: 0.85; }
    .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-divider {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin: 4px 0;
      position: relative;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      position: absolute;
      top: 50%; width: 38%;
      height: 1px;
      background: var(--border);
    }
    .auth-divider::before { left: 0; }
    .auth-divider::after  { right: 0; }

    /* message */
    .auth-msg {
      padding: 10px 14px;
      border-radius: 7px;
      font-size: 13px;
      display: none;
      margin-top: 4px;
    }
    .auth-msg.success {
      background: rgba(0,200,100,0.1);
      border: 1px solid rgba(0,200,100,0.25);
      color: #00c864;
      display: block;
    }
    .auth-msg.error {
      background: rgba(230,57,70,0.1);
      border: 1px solid rgba(230,57,70,0.25);
      color: var(--accent);
      display: block;
    }

    .back-home {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
      transition: color 0.2s;
    }
    .back-home:hover { color: var(--text); }
  </style>
</head>
<body>

  <nav>
    <a href="home.html" class="logo">Watch<span>Folio</span></a>
    <ul class="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="index.html">Search</a></li>
      <li><a href="#">Watchlist</a></li>
      <li><a href="profile.html">Profile</a></li>
    </ul>
    <div class="nav-right">
      <button class="btn-login" onclick="location.href='auth.html'">Log in</button>
      <button class="btn-signup" onclick="location.href='auth.html'">Sign up</button>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-box">

      <div class="auth-logo">Watch<span>Folio</span></div>
      <p class="auth-tagline">Your personal cinema awaits</p>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Log In</button>
        <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@email.com" required/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required/>
        </div>
        <div class="auth-msg" id="loginMsg"></div>
        <button type="submit" class="auth-submit" id="loginBtn">Log In</button>
      </form>

      <!-- Signup Form -->
      <form class="auth-form hidden" id="signupForm" onsubmit="handleSignup(event)">
        <div class="field">
          <label>Username</label>
          <input type="text" id="signupUsername" placeholder="e.g. zoro" required/>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="you@email.com" required/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="min. 6 characters" required/>
        </div>
        <div class="auth-msg" id="signupMsg"></div>
        <button type="submit" class="auth-submit" id="signupBtn">Create Account</button>
      </form>

      <a href="home.html" class="back-home">← Back to home</a>
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL     = 'https://uuudwramzdijxsekljbp.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1dWR3cmFtemRpanhzZWtsamJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTg2NTAsImV4cCI6MjA4OTc3NDY1MH0.l_wEz20wGZUlmfqSXTx73ctJnfSU02QWe7Yf5r-_tT4';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ── TAB SWITCH ──
    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
      });
      document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
      document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
    }

    // ── SHOW MESSAGE ──
    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = `auth-msg ${type}`;
    }

    // ── LOGIN ──
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      const email    = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showMsg('loginMsg', error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Log In';
      } else {
        showMsg('loginMsg', 'Logged in! Redirecting...', 'success');
        setTimeout(() => location.href = 'profile.html', 1200);
      }
    }

    // ── SIGNUP ──
    async function handleSignup(e) {
      e.preventDefault();
      const btn = document.getElementById('signupBtn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      const username = document.getElementById('signupUsername').value;
      const email    = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;

      const { error } = await supabase.auth.signUp({
        email,
        password,
        options: { data: { username } }
      });

      if (error) {
        showMsg('signupMsg', error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      } else {
        showMsg('signupMsg', 'Account created! Check your email to confirm.', 'success');
        btn.textContent = 'Done!';
      }
    }

    // ── REDIRECT IF ALREADY LOGGED IN ──
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) location.href = 'profile.html';
    });
  </script>

</body>
</html>
